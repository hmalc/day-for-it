name: BoatPleasantness
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  BoatPleasantnessKit:
    path: ./BoatPleasantnessKit
targets:
  BoatPleasantnessApp:
    type: application
    platform: iOS
    sources:
      - path: BoatPleasantnessApp/Sources
    resources:
      - path: BoatPleasantnessApp/Resources
    configFiles:
      Debug: BoatPleasantnessApp/Config/Debug.xcconfig
      Release: BoatPleasantnessApp/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hmalc.BoatPleasantness
        PRODUCT_NAME: BoatPleasantness
        INFOPLIST_FILE: BoatPleasantnessApp/Resources/Info.plist
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: BoatPleasantnessKit
        product: PleasantnessEngine
      - package: BoatPleasantnessKit
        product: WeatherCore
    scheme:
      testTargets:
        - BoatPleasantnessAppTests
  BoatPleasantnessAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BoatPleasantnessApp/Tests
    dependencies:
      - target: BoatPleasantnessApp
