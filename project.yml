name: dayforit
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
packages:
  dayforitKit:
    path: ./dayforitKit
targets:
  dayforit:
    type: application
    platform: iOS
    sources:
      - path: dayforitApp/Sources
      - path: dayforitApp/Resources/Assets.xcassets
        buildPhase: resources
      - path: dayforitApp/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
    configFiles:
      Debug: dayforitApp/Config/Debug.xcconfig
      Release: dayforitApp/Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hmalc.dayforit
        PRODUCT_NAME: dayforit
        INFOPLIST_FILE: dayforitApp/Resources/Info.plist
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        TARGETED_DEVICE_FAMILY: 1
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HD8CHB2HER
    dependencies:
      - package: dayforitKit
        product: PleasantnessEngine
      - package: dayforitKit
        product: WeatherCore
    scheme:
      testTargets:
        - dayforitTests
  dayforitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: dayforitApp/Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.hmalc.dayforit.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/dayforit.app/dayforit"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: dayforit
